name: Functional Tests

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Select environment"
        required: true
        type: choice
        options:
          - Development

      test_suite:
        description: "Select test suite"
        required: true
        type: choice
        options:
          - pet-smoke
          - pet-functional

permissions:
  contents: read

run-name: FunctionalTests_${{ github.run_number }}_${{ github.run_id }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      CLOUD: ${{ inputs.cloud }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Replace tokens in appsettings
        uses: qetza/replacetokens-action@v1.2.1
        with:
          sources: |
            Configuration/appsettings.${{ env.CLOUD }}.json
          variables: '${{ toJSON(vars) }}'
          missing-var-action: keep
          missing-var-log: error
          if-no-files-found: error
          no-telemetry: true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Resolve test filter
        shell: bash
        run: |
          if [ "${{ inputs.test_suite }}" = "pet-smoke" ]; then
            echo "FILTER=TestCategory=pet&TestCategory=smoke" >> "$GITHUB_ENV"
            echo "NAME=pet-smoke" >> "$GITHUB_ENV"
          elif [ "${{ inputs.test_suite }}" = "pet-functional" ]; then
            echo "FILTER=TestCategory=pet&TestCategory=functional" >> "$GITHUB_ENV"
            echo "NAME=pet-functional" >> "$GITHUB_ENV"
          else
            echo "Unknown test suite"
            exit 1
          fi

      - name: Run selected tests
        run: >
          dotnet test
          --configuration Release
          --no-build
          --logger "trx;LogFileName=${{ env.NAME }}.trx"
          --results-directory ./TestResults/${{ env.NAME }}
          --filter "${{ env.FILTER }}"

      - name: Upload HTML report for browser view
        id: upload_html
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reqnroll-report-view-${{ env.NAME }}-${{ inputs.cloud }}
          path: Api.Tests/bin/Release/net9.0/TestResults/reqnroll-report.html
          archive: false

      - name: Upload HTML report for zip download
        id: upload_zip
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reqnroll-report-download-${{ env.NAME }}-${{ inputs.cloud }}
          path: Api.Tests/bin/Release/net9.0/TestResults/reqnroll-report.html

      - name: Add report links to summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Reqnroll Report"
            echo
            echo "### View Report"
            echo "[Open HTML Report](${{ steps.upload_html.outputs.artifact-url }})"
            echo "### Download Report"
            echo "[Download ZIP](${{ steps.upload_zip.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"