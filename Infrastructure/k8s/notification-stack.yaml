apiVersion: v1
kind: Namespace
metadata:
  name: notification-system

---
apiVersion: v1
kind: Secret
metadata:
  name: sql-secret
  namespace: notification-system
type: Opaque
stringData:
  SA_PASSWORD: "pavliukalinacode"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sql-data
  namespace: notification-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-server
  namespace: notification-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sql-server
  template:
    metadata:
      labels:
        app: sql-server
    spec:
      containers:
        - name: sql-server
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-secret
                  key: SA_PASSWORD
          volumeMounts:
            - name: sql-data
              mountPath: /var/opt/mssql
      volumes:
        - name: sql-data
          persistentVolumeClaim:
            claimName: sql-data

---
apiVersion: v1
kind: Service
metadata:
  name: sql-server
  namespace: notification-system
spec:
  type: ClusterIP
  selector:
    app: sql-server
  ports:
    - name: sql
      port: 1433
      targetPort: 1433

---
apiVersion: batch/v1
kind: Job
metadata:
  name: sql-init
  namespace: notification-system
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: sql-init
          image: mcr.microsoft.com/mssql-tools
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for SQL Server..."
              sleep 30

              /opt/mssql-tools/bin/sqlcmd \
                -S sql-server \
                -U sa \
                -P "$SA_PASSWORD" \
                -i /sql/init.sql
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-secret
                  key: SA_PASSWORD
          volumeMounts:
            - name: init-script
              mountPath: /sql
      volumes:
        - name: init-script
          configMap:
            name: sql-init-script

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiremock
  namespace: notification-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wiremock
  template:
    metadata:
      labels:
        app: wiremock
    spec:
      containers:
        - name: wiremock
          image: wiremock/wiremock:3.3.1
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: wiremock
  namespace: notification-system
spec:
  type: NodePort
  selector:
    app: wiremock
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30083

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription-service
  namespace: notification-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subscription-service
  template:
    metadata:
      labels:
        app: subscription-service
    spec:
      containers:
        - name: subscription-service
          image: subscription-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Kubernetes"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ConnectionStrings__DefaultConnection
              value: "Server=sql-server,1433;Database=NotificationDb;User Id=sa;Password=pavliukalinacode;TrustServerCertificate=True"

---
apiVersion: v1
kind: Service
metadata:
  name: subscription-service
  namespace: notification-system
spec:
  type: NodePort
  selector:
    app: subscription-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30082

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: notification-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: event-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Kubernetes"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"

---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: notification-system
spec:
  type: NodePort
  selector:
    app: event-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081